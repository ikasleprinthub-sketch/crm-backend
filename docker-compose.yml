version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
      POSTGRES_DB: crm_db
    ports:
      - '5432:5432'
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm_user -d crm_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm_user:crm_pass@postgres:5432/crm_db
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  crm_pgdata:
    driver: local
